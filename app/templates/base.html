<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}IBF App{% endblock %}</title>
  <!-- Apply saved theme before render to prevent flash -->
  <script>
    (function(){
      var t = localStorage.getItem('ibf-theme') ||
        (window.matchMedia('(prefers-color-scheme:dark)').matches ? 'dark' : 'light');
      if (t === 'dark') document.documentElement.setAttribute('data-theme','dark');
    })();
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #f4f6f9; color: #1a1a2e; min-height: 100vh; }
    a { color: #4f46e5; text-decoration: none; }
    a:hover { text-decoration: underline; }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
      padding: 2rem;
    }
    .btn {
      display: inline-block;
      padding: .6rem 1.4rem;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: .95rem;
      font-weight: 600;
      transition: opacity .15s;
    }
    .btn:hover { opacity: .85; }
    .btn-primary { background: #4f46e5; color: #fff; width: 100%; }
    .form-group { margin-bottom: 1.2rem; }
    .form-group label { display: block; margin-bottom: .4rem; font-size: .875rem; font-weight: 500; color: #555; }
    .form-group input {
      width: 100%; padding: .6rem .85rem; border: 1px solid #d1d5db;
      border-radius: 8px; font-size: .95rem; outline: none; transition: border-color .15s;
    }
    .form-group input:focus { border-color: #4f46e5; }
    .error { color: #dc2626; font-size: .875rem; margin-bottom: 1rem; background: #fef2f2; padding: .6rem .85rem; border-radius: 8px; }

    /* ── Hamburger button (hidden on desktop) ── */
    .nav-hamburger {
      display: none; background: none; border: 1px solid #e5e7eb; border-radius: 6px;
      padding: .3rem .65rem; cursor: pointer; font-size: 1.1rem; color: #374151;
      line-height: 1; flex-shrink: 0;
    }

    /* ── Mobile breakpoint ── */
    @media (max-width: 700px) {
      /* Show hamburger, hide links by default */
      .nav-hamburger { display: flex; align-items: center; margin-left: auto; }
      nav .nav-links,
      nav .user-info {
        display: none !important;
        flex-direction: column !important;
        width: 100%;
        gap: .6rem !important;
        padding-top: .65rem;
        border-top: 1px solid #f3f4f6;
        font-size: .9rem;
      }
      nav .nav-links.nav-open,
      nav .user-info.nav-open { display: flex !important; }

      /* Nav wraps to next line */
      nav { flex-wrap: wrap !important; padding: .75rem 1rem !important; gap: .4rem !important; }

      /* Scrollable cards with tables */
      .card { overflow-x: auto; padding: 1.25rem !important; }

      /* Stack page-header actions */
      .page-header { flex-direction: column !important; align-items: flex-start !important; gap: .75rem !important; }

      /* Collapse 2-column grids */
      .grid-2  { grid-template-columns: 1fr !important; }
      .map-grid { grid-template-columns: 1fr !important; }
      .chart-grid { grid-template-columns: 1fr !important; }

      /* 2-per-row stat grids (covers all common naming patterns) */
      .stats-grid,
      .summary-grid,
      .stat-grid,
      .status-grid,
      .fc-grid,
      .spi-grid { grid-template-columns: 1fr 1fr !important; }

      /* Main spacing */
      .main { padding: 0 .75rem !important; margin: 1rem auto !important; }

      /* Filter bars wrap */
      .filter-bar { padding: .75rem !important; }

      /* Toolbar / add-row flex groups */
      .toolbar, .add-row { flex-direction: column !important; align-items: stretch !important; }

      /* Wide tables — force horizontal scroll inside any container */
      table { min-width: 480px; }

      /* Collapse stat-chip strips */
      .stat-chips, .stats-strip { flex-wrap: wrap !important; }

      /* Auth forms */
      .auth-wrapper { padding: .75rem; align-items: flex-start; padding-top: 2rem; }
    }
    /* Very narrow screens: single-column summary grids */
    @media (max-width: 420px) {
      .summary-grid,
      .stat-grid,
      .status-grid { grid-template-columns: 1fr !important; }
    }
    /* ── Dark mode toggle button ── */
    .dark-toggle {
      position: fixed; bottom: 1.25rem; right: 1.25rem; z-index: 9999;
      width: 2.4rem; height: 2.4rem; border-radius: 50%;
      border: 1px solid #e5e7eb; background: #fff;
      cursor: pointer; font-size: 1rem; box-shadow: 0 2px 8px rgba(0,0,0,.12);
      display: flex; align-items: center; justify-content: center;
      transition: background .15s, border-color .15s;
    }

    /* ── Dark mode overrides ── */
    [data-theme="dark"] body          { background: #0f172a; color: #e2e8f0; }
    [data-theme="dark"] a             { color: #818cf8; }

    [data-theme="dark"] nav           { background: #1e293b !important; border-color: #334155 !important; }
    [data-theme="dark"] nav .brand    { color: #818cf8 !important; }
    [data-theme="dark"] nav .nav-links a,
    [data-theme="dark"] nav .user-info a,
    [data-theme="dark"] nav .nav-links span,
    [data-theme="dark"] nav .user-info span { color: #94a3b8 !important; }
    [data-theme="dark"] nav .nav-links a.active,
    [data-theme="dark"] nav .user-info a.active { color: #818cf8 !important; }
    [data-theme="dark"] nav .nav-links a.logout,
    [data-theme="dark"] nav .user-info a.logout { color: #f87171 !important; }
    [data-theme="dark"] nav .nav-links { border-color: #334155 !important; }

    [data-theme="dark"] .card         { background: #1e293b !important; box-shadow: 0 1px 4px rgba(0,0,0,.4) !important; }
    [data-theme="dark"] .stat-card    { background: #1e293b !important; box-shadow: 0 1px 4px rgba(0,0,0,.3) !important; }
    [data-theme="dark"] .stat-value   { color: #f1f5f9 !important; }
    [data-theme="dark"] .stat-label   { color: #64748b !important; }
    [data-theme="dark"] .stat-sub     { color: #64748b !important; }
    [data-theme="dark"] .greeting     { color: #f1f5f9 !important; }
    [data-theme="dark"] .sub          { color: #94a3b8 !important; }
    [data-theme="dark"] .section-title { color: #94a3b8 !important; }
    [data-theme="dark"] .meta         { color: #64748b !important; }

    [data-theme="dark"] table         { background: #1e293b !important; }
    [data-theme="dark"] th            { color: #64748b !important; border-color: #334155 !important; }
    [data-theme="dark"] td            { border-color: #293548 !important; color: #cbd5e1 !important; }
    [data-theme="dark"] tr:hover td   { background: #243548 !important; }

    [data-theme="dark"] .form-group label  { color: #94a3b8; }
    [data-theme="dark"] .form-group input,
    [data-theme="dark"] .form-group select,
    [data-theme="dark"] .form-group textarea {
      background: #0f172a !important; border-color: #475569 !important; color: #e2e8f0 !important;
    }
    [data-theme="dark"] .form-group input:focus,
    [data-theme="dark"] .form-group select:focus { border-color: #818cf8 !important; }
    [data-theme="dark"] .error { background: #450a0a !important; color: #fca5a5 !important; }

    [data-theme="dark"] .filter-bar   { background: #1e293b !important; }
    [data-theme="dark"] .filter-bar input[type=text],
    [data-theme="dark"] .filter-bar input[type=date] {
      background: #0f172a !important; border-color: #475569 !important; color: #e2e8f0 !important;
    }

    [data-theme="dark"] .page-btn     { background: #1e293b !important; border-color: #334155 !important; color: #94a3b8 !important; }
    [data-theme="dark"] .page-btn:hover { background: #293548 !important; }
    [data-theme="dark"] .page-btn.disabled { color: #475569 !important; }

    [data-theme="dark"] .profile-table td { border-color: #1e3a52 !important; }
    [data-theme="dark"] .profile-table td:first-child { color: #64748b !important; }

    [data-theme="dark"] .empty        { color: #64748b !important; }
    [data-theme="dark"] .badge-green  { background: #064e3b !important; color: #6ee7b7 !important; }
    [data-theme="dark"] .badge-admin  { background: #2e1065 !important; color: #c4b5fd !important; }
    [data-theme="dark"] .badge-user   { background: #1e293b !important; color: #94a3b8 !important; }

    [data-theme="dark"] .nav-hamburger { border-color: #475569 !important; color: #94a3b8 !important; }
    [data-theme="dark"] .dark-toggle   { background: #1e293b !important; border-color: #475569 !important; }

    /* Auth pages */
    [data-theme="dark"] .auth-card    { background: #1e293b !important; }
    [data-theme="dark"] .auth-card h1 { color: #f1f5f9; }
    [data-theme="dark"] .auth-card p  { color: #94a3b8; }
    [data-theme="dark"] .success-box  { background: #052e16 !important; border-color: #166534 !important; color: #86efac !important; }

    /* ── Common surface/container classes ── */
    [data-theme="dark"] .main            { background: transparent !important; }
    [data-theme="dark"] .section,
    [data-theme="dark"] .panel,
    [data-theme="dark"] .box,
    [data-theme="dark"] .widget          { background: #1e293b !important; }
    [data-theme="dark"] h1, [data-theme="dark"] h2,
    [data-theme="dark"] h3, [data-theme="dark"] h4 { color: #f1f5f9 !important; }
    [data-theme="dark"] label            { color: #94a3b8 !important; }
    [data-theme="dark"] select           { background: #0f172a !important; border-color: #475569 !important; color: #e2e8f0 !important; }
    [data-theme="dark"] input[type=text],
    [data-theme="dark"] input[type=number],
    [data-theme="dark"] input[type=date],
    [data-theme="dark"] input[type=email],
    [data-theme="dark"] input[type=password],
    [data-theme="dark"] textarea         { background: #0f172a !important; border-color: #475569 !important; color: #e2e8f0 !important; }
    [data-theme="dark"] hr               { border-color: #334155 !important; }

    /* ── Inline-style background overrides for top colours ── */
    /* white */
    [data-theme="dark"] [style*="background:#fff"],
    [data-theme="dark"] [style*="background: #fff"],
    [data-theme="dark"] [style*="background:#ffffff"],
    [data-theme="dark"] [style*="background: #ffffff"] { background: #1e293b !important; color: #e2e8f0 !important; }
    /* light grays */
    [data-theme="dark"] [style*="background:#f9fafb"],
    [data-theme="dark"] [style*="background: #f9fafb"],
    [data-theme="dark"] [style*="background:#f3f4f6"],
    [data-theme="dark"] [style*="background: #f3f4f6"],
    [data-theme="dark"] [style*="background:#f1f5f9"],
    [data-theme="dark"] [style*="background: #f1f5f9"],
    [data-theme="dark"] [style*="background:#f8fafc"],
    [data-theme="dark"] [style*="background: #f8fafc"],
    [data-theme="dark"] [style*="background:#fafafa"],
    [data-theme="dark"] [style*="background: #fafafa"] { background: #1e293b !important; color: #e2e8f0 !important; }
    /* semantic: error/red */
    [data-theme="dark"] [style*="background:#fef2f2"],
    [data-theme="dark"] [style*="background: #fef2f2"],
    [data-theme="dark"] [style*="background:#fee2e2"],
    [data-theme="dark"] [style*="background: #fee2e2"] { background: #450a0a !important; color: #fca5a5 !important; }
    /* semantic: warning/amber */
    [data-theme="dark"] [style*="background:#fffbeb"],
    [data-theme="dark"] [style*="background: #fffbeb"],
    [data-theme="dark"] [style*="background:#fef3c7"],
    [data-theme="dark"] [style*="background: #fef3c7"],
    [data-theme="dark"] [style*="background:#fef9c3"],
    [data-theme="dark"] [style*="background: #fef9c3"],
    [data-theme="dark"] [style*="background:#fff7ed"],
    [data-theme="dark"] [style*="background: #fff7ed"] { background: #451a03 !important; color: #fcd34d !important; }
    /* semantic: success/green */
    [data-theme="dark"] [style*="background:#f0fdf4"],
    [data-theme="dark"] [style*="background: #f0fdf4"],
    [data-theme="dark"] [style*="background:#dcfce7"],
    [data-theme="dark"] [style*="background: #dcfce7"],
    [data-theme="dark"] [style*="background:#bbf7d0"],
    [data-theme="dark"] [style*="background: #bbf7d0"] { background: #052e16 !important; color: #86efac !important; }
    /* semantic: info/blue */
    [data-theme="dark"] [style*="background:#eff6ff"],
    [data-theme="dark"] [style*="background: #eff6ff"],
    [data-theme="dark"] [style*="background:#dbeafe"],
    [data-theme="dark"] [style*="background: #dbeafe"],
    [data-theme="dark"] [style*="background:#e0f2fe"],
    [data-theme="dark"] [style*="background: #e0f2fe"] { background: #0c1a2e !important; color: #93c5fd !important; }
    /* semantic: purple/indigo highlight */
    [data-theme="dark"] [style*="background:#f5f3ff"],
    [data-theme="dark"] [style*="background: #f5f3ff"],
    [data-theme="dark"] [style*="background:#f3e8ff"],
    [data-theme="dark"] [style*="background: #f3e8ff"],
    [data-theme="dark"] [style*="background:#e0e7ff"],
    [data-theme="dark"] [style*="background: #e0e7ff"] { background: #1e1b4b !important; color: #c4b5fd !important; }
    /* more light grays / near-whites */
    [data-theme="dark"] [style*="background:#fefce8"],
    [data-theme="dark"] [style*="background: #fefce8"],
    [data-theme="dark"] [style*="background:#fde68a"],
    [data-theme="dark"] [style*="background: #fde68a"] { background: #451a03 !important; color: #fcd34d !important; }
    [data-theme="dark"] [style*="background:#d1d5db"],
    [data-theme="dark"] [style*="background: #d1d5db"],
    [data-theme="dark"] [style*="background:#e5e7eb"],
    [data-theme="dark"] [style*="background: #e5e7eb"],
    [data-theme="dark"] [style*="background:#eef2ff"],
    [data-theme="dark"] [style*="background: #eef2ff"],
    [data-theme="dark"] [style*="background:#fef9f0"],
    [data-theme="dark"] [style*="background: #fef9f0"] { background: #1e293b !important; color: #e2e8f0 !important; }
    /* border-color inline overrides */
    [data-theme="dark"] [style*="border-color:#e5e7eb"],
    [data-theme="dark"] [style*="border-color: #e5e7eb"],
    [data-theme="dark"] [style*="border:#e5e7eb"],
    [data-theme="dark"] [style*="border: #e5e7eb"]     { border-color: #334155 !important; }
  </style>
  {% block extra_styles %}{% endblock %}
</head>
<body>
  <meta name="csrf-token" content="{{ request.state.csrf_token if request.state.csrf_token is defined else '' }}">
  {% block body %}{% endblock %}
  <button class="dark-toggle" id="dark-toggle" title="Toggle dark mode" aria-label="Toggle dark mode">🌙</button>

  <!-- Floating AI assistant button + side panel -->
  <button id="ai-fab" title="Ask AI Assistant"
          style="display:none;position:fixed;bottom:4.2rem;right:1.25rem;z-index:9998;
                 width:2.4rem;height:2.4rem;border-radius:50%;border:1px solid #e5e7eb;
                 background:#4f46e5;color:#fff;cursor:pointer;font-size:1rem;
                 box-shadow:0 2px 8px rgba(0,0,0,.18);
                 display:flex;align-items:center;justify-content:center;"
          aria-label="Open AI Assistant">🤖</button>

  <div id="ai-panel"
       style="display:none;position:fixed;bottom:7.5rem;right:1.25rem;z-index:9997;
              width:340px;max-height:480px;background:#fff;border:1px solid #e5e7eb;
              border-radius:14px;box-shadow:0 8px 32px rgba(0,0,0,.14);
              display:none;flex-direction:column;overflow:hidden;">
    <div style="padding:.75rem 1rem;border-bottom:1px solid #f3f4f6;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;">
      <span style="font-weight:700;font-size:.9rem;">AI Assistant</span>
      <div style="display:flex;gap:.5rem;align-items:center;">
        <a href="/chat" style="font-size:.75rem;color:#4f46e5;text-decoration:none;font-weight:600;">Open full ↗</a>
        <button id="ai-close" style="background:none;border:none;cursor:pointer;font-size:1rem;color:#9ca3af;line-height:1;padding:0;">✕</button>
      </div>
    </div>
    <div id="ai-msgs" style="flex:1;overflow-y:auto;padding:.75rem;display:flex;flex-direction:column;gap:.5rem;min-height:120px;max-height:300px;"></div>
    <div style="padding:.5rem .75rem;border-top:1px solid #f3f4f6;display:flex;gap:.4rem;flex-shrink:0;">
      <input id="ai-input" type="text" maxlength="500"
             placeholder="Ask about your data…"
             style="flex:1;padding:.45rem .7rem;border:1px solid #d1d5db;border-radius:8px;font-size:.82rem;outline:none;font-family:inherit;" />
      <button id="ai-send"
              style="padding:.45rem .75rem;background:#4f46e5;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:.82rem;font-weight:600;">↑</button>
    </div>
  </div>

  <script>
  (function () {
    var fab = document.getElementById('ai-fab');
    var panel = document.getElementById('ai-panel');
    var closeBtn = document.getElementById('ai-close');
    var msgs = document.getElementById('ai-msgs');
    var input = document.getElementById('ai-input');
    var sendBtn = document.getElementById('ai-send');
    var history = [];
    var open = false;

    // Don't show fab on the /chat page itself
    if (window.location.pathname !== '/chat') {
      fab.style.display = 'flex';
    }

    fab.addEventListener('click', function () {
      open = !open;
      panel.style.display = open ? 'flex' : 'none';
      if (open) { input.focus(); }
    });
    closeBtn.addEventListener('click', function () {
      open = false; panel.style.display = 'none';
    });

    function bubble(role, text) {
      var d = document.createElement('div');
      d.style.cssText = 'display:flex;gap:.4rem;align-items:flex-start;' + (role === 'user' ? 'flex-direction:row-reverse;' : '');
      var av = document.createElement('div');
      av.textContent = role === 'user' ? 'You' : 'AI';
      av.style.cssText = 'font-size:.6rem;font-weight:700;padding:.2rem .35rem;border-radius:4px;flex-shrink:0;margin-top:.15rem;background:' + (role === 'user' ? '#4f46e5;color:#fff' : '#e0e7ff;color:#4f46e5');
      var b = document.createElement('div');
      b.style.cssText = 'font-size:.8rem;line-height:1.45;padding:.45rem .6rem;border-radius:8px;max-width:85%;white-space:pre-wrap;word-break:break-word;' + (role === 'user' ? 'background:#4f46e5;color:#fff;border-bottom-right-radius:2px;' : 'background:#f3f4f6;color:#1a1a2e;border-bottom-left-radius:2px;');
      b.textContent = text;
      d.appendChild(av); d.appendChild(b);
      msgs.appendChild(d);
      msgs.scrollTop = msgs.scrollHeight;
      return b;
    }

    async function send() {
      var text = input.value.trim();
      if (!text || sendBtn.disabled) return;
      sendBtn.disabled = true;
      input.value = '';
      bubble('user', text);
      var aiBubble = bubble('assistant', '…');
      var full = '';
      try {
        var res = await fetch('/api/v1/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text, history: history })
        });
        var reader = res.body.getReader();
        var dec = new TextDecoder();
        var buf = '';
        var started = false;
        while (true) {
          var r = await reader.read();
          if (r.done) break;
          buf += dec.decode(r.value, { stream: true });
          var parts = buf.split('\n\n');
          buf = parts.pop();
          for (var p of parts) {
            if (!p.startsWith('data: ')) continue;
            try {
              var obj = JSON.parse(p.slice(6));
              if (obj.error) { aiBubble.textContent = obj.error; aiBubble.style.color = '#dc2626'; return; }
              if (!started) { aiBubble.textContent = ''; started = true; }
              full += obj.chunk;
              aiBubble.textContent = full;
              msgs.scrollTop = msgs.scrollHeight;
            } catch (_) {}
          }
        }
      } catch (e) { aiBubble.textContent = 'Connection error.'; aiBubble.style.color = '#dc2626'; }
      if (full) {
        history.push({ role: 'user', content: text });
        history.push({ role: 'assistant', content: full });
      }
      sendBtn.disabled = false;
      input.focus();
    }

    sendBtn.addEventListener('click', send);
    input.addEventListener('keydown', function (e) { if (e.key === 'Enter') { e.preventDefault(); send(); } });
  })();
  </script>

  <!-- SSE notification badge (injects a counter on any unacknowledged activations broadcast) -->
  <div id="sse-badge"
       style="display:none;position:fixed;top:.9rem;right:4.5rem;z-index:9999;
              background:#dc2626;color:#fff;border-radius:999px;font-size:.72rem;font-weight:700;
              padding:.25rem .6rem;cursor:pointer;"
       title="New trigger activations"
       onclick="window.location='/triggers'">
    <span id="sse-count">0</span> new activation
  </div>

  <script>
  (function() {
    var badge = document.getElementById('sse-badge');
    var countEl = document.getElementById('sse-count');
    var n = 0;
    try {
      var es = new EventSource('/api/v1/stream');
      es.addEventListener('activation', function(e) {
        n++;
        countEl.textContent = n;
        badge.style.display = 'block';
        badge.querySelector('span').nextSibling
          || (badge.lastChild.nodeValue = ' new activation' + (n > 1 ? 's' : ''));
      });
    } catch(e) {}
  })();
  </script>
  {% block extra_scripts %}{% endblock %}
  <script>
  (function () {
    // Auto-inject CSRF hidden field into all state-changing forms
    function injectCsrf() {
      var token = document.querySelector('meta[name="csrf-token"]')?.content || '';
      if (!token) return;
      document.querySelectorAll('form').forEach(function (form) {
        if (['post','put','patch','delete'].includes(form.method.toLowerCase())) {
          if (!form.querySelector('[name="csrf_token"]')) {
            var inp = document.createElement('input');
            inp.type = 'hidden'; inp.name = 'csrf_token'; inp.value = token;
            form.appendChild(inp);
          }
        }
      });
    }
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', injectCsrf);
    } else {
      injectCsrf();
    }

    // Update toggle icon to match current theme
    var btn = document.getElementById('dark-toggle');
    if (btn) btn.textContent = document.documentElement.getAttribute('data-theme') === 'dark' ? '☀️' : '🌙';

    function initNav() {
      document.querySelectorAll('nav').forEach(function (nav) {
        var links = nav.querySelector('.nav-links, .user-info');
        if (!links) return;
        var btn = document.createElement('button');
        btn.className = 'nav-hamburger';
        btn.setAttribute('aria-label', 'Menu');
        btn.textContent = '☰';
        btn.addEventListener('click', function () {
          links.classList.toggle('nav-open');
          btn.textContent = links.classList.contains('nav-open') ? '✕' : '☰';
        });
        nav.insertBefore(btn, links);
      });
    }
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initNav);
    } else {
      initNav();
    }

    // Dark mode toggle
    if (btn) {
      btn.addEventListener('click', function () {
        var dark = document.documentElement.getAttribute('data-theme') === 'dark';
        if (dark) {
          document.documentElement.removeAttribute('data-theme');
          localStorage.setItem('ibf-theme', 'light');
          btn.textContent = '🌙';
        } else {
          document.documentElement.setAttribute('data-theme', 'dark');
          localStorage.setItem('ibf-theme', 'dark');
          btn.textContent = '☀️';
        }
      });
    }
  })();
  </script>
</body>
</html>
