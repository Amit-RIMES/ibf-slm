{% extends "base.html" %}
{% block title %}Register — IBF App{% endblock %}

{% block extra_styles %}
<style>
  .auth-wrapper { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 1rem; }
  .auth-card { width: 100%; max-width: 420px; }
  .auth-card h1 { font-size: 1.6rem; margin-bottom: .4rem; }
  .auth-card p { color: #6b7280; margin-bottom: 1.6rem; font-size: .9rem; }
</style>
{% endblock %}

{% block body %}
<div class="auth-wrapper">
  <div class="card auth-card">
    <h1>Create an account</h1>
    <p>It only takes a moment</p>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <form method="post" action="/register">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="johndoe" required />
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Min. 8 characters" required minlength="8" autocomplete="new-password" />
        <div id="pw-strength-bar" style="height:4px;border-radius:2px;margin-top:5px;background:#e5e7eb;overflow:hidden;">
          <div id="pw-bar" style="height:100%;width:0%;transition:width .2s,background .2s;border-radius:2px;"></div>
        </div>
        <div id="pw-hint" style="font-size:.72rem;margin-top:3px;min-height:1em;"></div>
      </div>
      <button type="submit" class="btn btn-primary">Create account</button>
    </form>

    <p style="margin-top:1.2rem; text-align:center; font-size:.875rem; color:#6b7280;">
      Already have an account? <a href="/login">Sign in</a>
    </p>
  </div>
</div>
<script>
(function () {
  var inp = document.getElementById('password');
  var bar = document.getElementById('pw-bar');
  var hint = document.getElementById('pw-hint');
  var COLORS = ['#dc2626', '#f59e0b', '#16a34a', '#15803d'];
  var LABELS = ['Too weak', 'Weak — add a number or letter', 'Good', 'Strong'];
  inp.addEventListener('input', function () {
    var v = inp.value;
    if (!v) { bar.style.width = '0%'; hint.textContent = ''; return; }
    var score = 0;
    if (v.length >= 8) score++;
    if (/[a-zA-Z]/.test(v)) score++;
    if (/\d/.test(v)) score++;
    if (/[^a-zA-Z0-9]/.test(v) || v.length >= 14) score++;
    score = Math.min(score - 1, 3);
    if (score < 0) score = 0;
    bar.style.width = ((score + 1) * 25) + '%';
    bar.style.background = COLORS[score];
    hint.style.color = COLORS[score];
    hint.textContent = LABELS[score];
  });
})();
</script>
{% endblock %}
