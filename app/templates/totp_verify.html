{% extends "base.html" %}
{% block title %}Verify 2FA — IBF App{% endblock %}
{% block extra_styles %}
<style>
  .main { max-width: 380px; margin: 5rem auto; padding: 0 1rem; text-align: center; }
  .icon { font-size: 2.5rem; margin-bottom: .75rem; }
  h1 { font-size: 1.3rem; font-weight: 700; margin-bottom: .25rem; }
  p { color: #6b7280; font-size: .9rem; margin-bottom: 1.5rem; }
  .card { background: #fff; border-radius: 12px; box-shadow: 0 1px 4px rgba(0,0,0,.08); padding: 1.75rem; }
  input[type=text] { width: 100%; padding: .75rem; border: 1px solid #d1d5db; border-radius: 8px; font-size: 1.4rem; text-align: center; letter-spacing: .2em; outline: none; box-sizing: border-box; margin-bottom: .75rem; }
  input[type=text]:focus { border-color: #4f46e5; }
  .btn { width: 100%; padding: .7rem; background: #4f46e5; color: #fff; border: none; border-radius: 8px; font-size: .95rem; font-weight: 600; cursor: pointer; }
  .btn:hover { opacity: .88; }
  .alert-err { background: #fef2f2; border: 1px solid #fecaca; color: #991b1b; border-radius: 8px; padding: .65rem .9rem; margin-bottom: .9rem; font-size: .88rem; }
  .back { display: block; margin-top: 1rem; color: #6b7280; font-size: .875rem; text-decoration: none; }
  .back:hover { color: #374151; }
</style>
{% endblock %}
{% block body %}
<div class="main">
  <div class="icon">🔐</div>
  <h1>Two-factor authentication</h1>
  <p>Enter the 6-digit code from your authenticator app.</p>
  <div class="card">
    {% if error %}<div class="alert-err">{{ error }}</div>{% endif %}
    <form method="post" action="/account/2fa/verify">
      <input type="text" name="code" placeholder="000000" autocomplete="one-time-code"
             inputmode="numeric" pattern="[0-9]{6}" maxlength="6" autofocus>
      <button type="submit" class="btn">Verify</button>
    </form>
  </div>
  <a href="/login" class="back">← Back to login</a>
</div>
{% endblock %}
